# Stoxify Frontend — Development docker-compose
# Use this for local development with relaxed rate limits

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Server-side route handlers use these URLs for signed backend requests.
      - AUTH_SERVICE_URL=https://stoxify-backend-monolith.onrender.com
      - USER_SERVICE_URL=https://stoxify-backend-monolith.onrender.com
      - ECDSA_PRIVATE_KEY_PATH=/app/keys/ecdsa_private.pem
      - ECDSA_KEY_VERSION=v1.0
      # Optional client-side service URLs for components that read public env.
      - NEXT_PUBLIC_API_URL=https://stoxify-backend-monolith.onrender.com
      - NEXT_PUBLIC_USER_URL=https://stoxify-backend-monolith.onrender.com
    ports:
      - "3000:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keys:/app/keys:ro
      # Mount for hot-reload in development (optional)
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
